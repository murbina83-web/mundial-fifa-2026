<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏆 FIFA 2026</title>
<style>
:root{--dark:#0a0a1a;--blue:#0a1628;--gold:#c8963e;--gold2:#f0c060;--green:#22c55e;--text:#e8edf5;--muted:#7a8fa8;--card:#111827;--border:#1e3050}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--dark);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#0a1628,#1a2d4a,#0a1628);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:1.8rem}
.logo-text h1{font-size:.9rem;font-weight:800;color:var(--gold2)}
.logo-text p{font-size:.58rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.btn-fifa{background:var(--gold);color:#000;border:none;padding:7px 12px;border-radius:8px;font-weight:700;font-size:.75rem;cursor:pointer}
.tabs{background:var(--blue);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);padding:12px 15px;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center}
.stat-v{font-size:1.45rem;font-weight:800;color:var(--gold2)}
.stat-l{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:2px}
.search-bar{padding:0 14px 10px}
.sw{position:relative}
.sw input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 12px 9px 34px;border-radius:10px;font-size:.88rem;outline:none}
.sw input:focus{border-color:var(--gold)}
.sw::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.8rem}
.pills{padding:0 14px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;background:var(--card);color:var(--muted);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:.74rem;font-weight:600;cursor:pointer}
.pill.active{background:var(--gold);color:#000;border-color:var(--gold)}
.day-section{padding:0 14px;margin-bottom:18px}
.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.day-title{font-size:.76rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
.day-line{flex:1;height:1px;background:var(--border)}
.day-cnt{font-size:.65rem;color:var(--muted);white-space:nowrap}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;text-decoration:none;display:block;color:inherit}
.match-card:active{background:#1a2535}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.mc-g{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:2px 7px;border-radius:4px;background:rgba(200,150,62,.15);color:var(--gold)}
.mc-g.ko{background:rgba(232,52,74,.15);color:#ff6b7a}
.mc-city{font-size:.63rem;color:var(--muted)}
.mc-teams{display:flex;align-items:center;gap:6px}
.team{flex:1;overflow:hidden}
.th{text-align:right}
.ta{text-align:left}
.tf{font-size:1.5rem;line-height:1.1}
.tn{font-size:.8rem;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sa{display:flex;flex-direction:column;align-items:center;min-width:80px;gap:3px}
.sn-wrap{display:flex;align-items:center;gap:5px}
.sn{font-size:1.65rem;font-weight:900;min-width:24px;text-align:center}
.ss{font-size:1.1rem;color:var(--muted)}
.sd{font-size:1.1rem;color:var(--muted)}
.sb{font-size:.57rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:2px 8px;border-radius:10px}
.sf{background:rgba(122,143,168,.15);color:var(--muted)}
.sl{background:rgba(34,197,94,.2);color:var(--green);animation:pulse 1.5s infinite}
.sp{background:rgba(200,150,62,.12);color:var(--gold)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mc-foot{margin-top:7px;font-size:.63rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section{padding:0 14px;margin-bottom:22px}
.sec-title{font-size:.82rem;font-weight:800;color:var(--gold2);text-transform:uppercase;letter-spacing:1.5px;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:2.8rem;margin-bottom:10px}
.padbot{height:max(16px,env(safe-area-inset-bottom))}
.data-note{text-align:center;padding:8px;font-size:.65rem;color:var(--muted);border-top:1px solid var(--border);margin-top:4px}
</style>
</head>

.fifa.com/es/match-centre/match/760513"}, {"date": "martes 14 julio 2026", "home": "Quarterfinal 1 Winner", "scoreHome": "13:00", "status": "PENDIENTE", "scoreAway": "", "away": "Quarterfinal 2 Winner", "phase": "Primera fase", "group": "", "stadium": "AT&T Stadium", "city": "(Arlington, Texas)", "href": "https://www.fifa.com/es/match-centre/match/760514"}, {"date": "miércoles 15 julio 2026", "home": "Quarterfinal 3 Winner", "scoreHome": "13:00", "status": "PENDIENTE", "scoreAway": "", "away": "Quarterfinal 4 Winner", "phase": "Primera fase", "group": "", "stadium": "Mercedes-Benz Stadium", "city": "(Atlanta, Georgia)", "href": "https://www.fifa.com/es/match-centre/match/760515"}, {"date": "sábado 18 julio 2026", "home": "Semifinal 1 Loser", "scoreHome": "15:00", "status": "PENDIENTE", "scoreAway": "", "away": "Semifinal 2 Loser", "phase": "Primera fase", "group": "", "stadium": "Hard Rock Stadium", "city": "(Miami Gardens, Florida)", "href": "https://www.fifa.com/es/match-centre/match/760516"}, {"date": "domingo 19 julio 2026", "home": "Semifinal 1 Winner", "scoreHome": "13:00", "status": "PENDIENTE", "scoreAway": "", "away": "Semifinal 2 Winner", "phase": "Primera fase", "group": "", "stadium": "MetLife Stadium", "city": "(East Rutherford, New Jersey)", "href": "https://www.fifa.com/es/match-centre/match/760517"}];

const FL = {'México':'🇲🇽','Sudáfrica':'🇿🇦','República de Corea':'🇰🇷','Chequia':'🇨🇿','Canadá':'🇨🇦','Bosnia y Herzegovina':'🇧🇦','EE. UU.':'🇺🇸','Paraguay':'🇵🇾','Catar':'🇶🇦','Suiza':'🇨🇭','Brasil':'🇧🇷','Marruecos':'🇲🇦','Haití':'🇭🇹','Escocia':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Australia':'🇦🇺','Turquía':'🇹🇷','Alemania':'🇩🇪','Curazao':'🇨🇼','Países Bajos':'🇳🇱','Japón':'🇯🇵','Uruguay':'🇺🇾','Polonia':'🇵🇱','España':'🇪🇸','Ghana':'🇬🇭','Senegal':'🇸🇳','Serbia':'🇷🇸','Portugal':'🇵🇹','Argelia':'🇩🇿','Francia':'🇫🇷','Nueva Zelanda':'🇳🇿','Inglaterra':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croacia':'🇭🇷','Panamá':'🇵🇦','Colombia':'🇨🇴','RD Congo':'🇨🇩','Uzbekistán':'🇺🇿','Argentina':'🇦🇷','Irak':'🇮🇶','Noruega':'🇳🇴','Austria':'🇦🇹','Jordania':'🇯🇴','RI de Irán':'🇮🇷','Honduras':'🇭🇳','Eslovenia':'🇸🇮','Chile':'🇨🇱','Ecuador':'🇪🇨','Costa de Marfil':'🇨🇮','Nigeria':'🇳🇬','Arabia Saudí':'🇸🇦','Venezuela':'🇻🇪','Italia':'🇮🇹','Rumanía':'🇷🇴','Bélgica':'🇧🇪','Egipto':'🇪🇬','Dinamarca':'🇩🇰','Túnez':'🇹🇳','Suecia':'🇸🇪','Eslovaquia':'🇸🇰','Mali':'🇲🇱','Grecia':'🇬🇷','Islas de Cabo Verde':'🇨🇻','Costa Rica':'🇨🇷'};
const fl = t => FL[t] || '🏴';
let tab='calendar', group='TODOS', search='';
const isKO = g => g && !g.startsWith('Grupo');

function sHtml(m) {
  if (m.status==='FINAL')
    return `<div class="sn-wrap"><span class="sn">${m.scoreHome}</span><span class="ss">–</span><span class="sn">${m.scoreAway}</span></div><span class="sb sf">FINAL</span>`;
  if (m.status && m.status.includes("'"))
    return `<div class="sn-wrap"><span class="sn">${m.scoreHome}</span><span class="ss">–</span><span class="sn">${m.scoreAway}</span></div><span class="sb sl">🔴 EN VIVO</span>`;
  const time = m.scoreHome && m.scoreHome.includes(':') ? m.scoreHome+' hs' : '';
  return `<div class="sn-wrap"><span class="sd">vs</span></div><span class="sb sp">${time || 'PENDIENTE'}</span>`;
}

function card(m) {
  const city = (m.city||'').replace(/[()]/g,'');
  const gclass = isKO(m.group) ? 'mc-g ko' : 'mc-g';
  return `<a class="match-card" href="${m.href}" target="_blank" rel="noopener">
    <div class="mc-top"><span class="${gclass}">${m.group||m.phase||'—'}</span><span class="mc-city">${city}</span></div>
    <div class="mc-teams">
      <div class="team th"><div class="tf">${fl(m.home)}</div><div class="tn">${m.home}</div></div>
      <div class="sa">${sHtml(m)}</div>
      <div class="team ta"><div class="tf">${fl(m.away)}</div><div class="tn">${m.away}</div></div>
    </div>
    <div class="mc-foot">🏟 ${m.stadium||'—'}</div>
  </a>`;
}

function getFiltered() {
  return MATCHES.filter(m => {
    if (group!=='TODOS' && m.group!==group) return false;
    if (search) { const q=search.toLowerCase(); return m.home?.toLowerCase().includes(q)||m.away?.toLowerCase().includes(q)||m.stadium?.toLowerCase().includes(q); }
    return true;
  });
}

function byDate(arr) {
  const map={};
  arr.forEach(m=>{ if(!map[m.date]) map[m.date]=[]; map[m.date].push(m); });
  return map;
}

function renderCalendar(arr) {
  if (!arr.length) return '<div class="empty"><div class="empty-icon">🔍</div>Sin resultados</div>';
  return Object.entries(byDate(arr)).map(([d,ms])=>`
    <div class="day-section">
      <div class="day-hdr"><span class="day-title">${d}</span><span class="day-line"></span><span class="day-cnt">${ms.length}p</span></div>
      ${ms.map(card).join('')}
    </div>`).join('');
}

function renderGroups(arr) {
  const gs={};
  arr.filter(m=>!isKO(m.group)).forEach(m=>{ const g=m.group||'Sin grupo'; if(!gs[g]) gs[g]=[]; gs[g].push(m); });
  if (!Object.keys(gs).length) return '<div class="empty"><div class="empty-icon">🔍</div>Sin resultados</div>';
  return Object.keys(gs).sort().map(g=>`
    <div class="section"><div class="sec-title">👥 ${g}</div>${gs[g].map(card).join('')}</div>`).join('');
}

function renderKnockout() {
  const ps={};
  MATCHES.filter(m=>isKO(m.group)).forEach(m=>{ const p=m.group||m.phase||'Eliminatoria'; if(!ps[p]) ps[p]=[]; ps[p].push(m); });
  const order=['Dieciseisavos de final','Octavos de final','Cuartos de final','Semifinal','Partido por el tercer puesto','Final'];
  const keys=order.filter(k=>ps[k]).concat(Object.keys(ps).filter(k=>!order.includes(k)));
  if (!keys.length) return '<div class="empty"><div class="empty-icon">⏳</div>La fase eliminatoria aún no ha comenzado</div>';
  return keys.map(p=>`<div class="section"><div class="sec-title">⚡ ${p}</div>${ps[p].map(card).join('')}</div>`).join('');
}

function renderResults(arr) {
  const played=arr.filter(m=>m.status==='FINAL');
  if (!played.length) return '<div class="empty"><div class="empty-icon">⏳</div>Aún no hay resultados</div>';
  return Object.entries(byDate(played)).reverse().map(([d,ms])=>`
    <div class="day-section">
      <div class="day-hdr"><span class="day-title">${d}</span><span class="day-line"></span><span class="day-cnt">${ms.length}p</span></div>
      ${ms.map(card).join('')}
    </div>`).join('');
}

function updateStats() {
  const played=MATCHES.filter(m=>m.status==='FINAL');
  const goals=played.reduce((s,m)=>(parseInt(m.scoreHome)||0)+(parseInt(m.scoreAway)||0)+s,0);
  document.getElementById('sT').textContent=MATCHES.length;
  document.getElementById('sP').textContent=played.length;
  document.getElementById('sN').textContent=MATCHES.length-played.length;
  document.getElementById('sG').textContent=goals;
}

function render() {
  const arr=getFiltered();
  let html='';
  if (tab==='calendar') html=renderCalendar(arr);
  else if (tab==='groups') html=renderGroups(arr);
  else if (tab==='knockout') html=renderKnockout();
  else if (tab==='results') html=renderResults(arr);
  document.getElementById('content').innerHTML=html;
  document.getElementById('fw').style.display=tab==='knockout'?'none':'';
}

function switchTab(t,btn) { tab=t; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function onGroup(g,btn) { group=g; document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function onSearch(v) { search=v; render(); }

// Show data timestamp note
const lastUpdate = 'Datos extraídos de FIFA.com el 16/06/2026';
document.getElementById('dataNote').textContent = '📡 ' + lastUpdate + ' · Toca un partido para ver detalles en FIFA';

updateStats();
render();
</script>
